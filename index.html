<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DRAPE — AI Fashion Store</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a}
  nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:10}
  .brand{font-size:20px;font-weight:600;letter-spacing:.08em}
  .cart-btn{background:none;border:1px solid #ddd;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px}
  .cart-btn:hover{background:#f5f4f0}
  .cat-bar{display:flex;gap:8px;padding:14px 24px;background:#fff;border-bottom:1px solid #eee;overflow-x:auto}
  .pill{border:1px solid #ddd;border-radius:20px;padding:6px 16px;font-size:13px;cursor:pointer;white-space:nowrap;background:#fff;transition:all .15s}
  .pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;padding:24px}
  .card{background:#fff;border-radius:14px;border:1px solid #eee;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .card:hover,.card.selected{border-color:#1a1a1a}
  .card.selected{border-width:2px}
  .card-img{height:130px;display:flex;align-items:center;justify-content:center;font-size:52px;background:#fafaf8}
  .card-body{padding:12px}
  .card-name{font-size:14px;font-weight:500;margin-bottom:3px}
  .card-price{font-size:14px;color:#555}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:5px;font-weight:500}
  .b-new{background:#e1f5ee;color:#0f6e56}
  .b-hot{background:#fcebeb;color:#a32d2d}
  .b-sale{background:#faeeda;color:#854f0b}
  .bottom{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #eee;background:#fff}
  .detail-pane{padding:20px 24px;border-right:1px solid #eee}
  .ai-pane{padding:20px 24px;background:#fafaf8}
  .pane-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .size-grid{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
  .sz{border:1px solid #ddd;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;background:#fff;transition:all .15s}
  .sz.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .add-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
  .add-btn:hover{opacity:.85}
  .ai-bubble{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6;margin-bottom:8px}
  .ai-step{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:12px;color:#666;border-bottom:1px solid #f0f0f0}
  .dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
  .d-done{background:#e1f5ee;color:#0f6e56}
  .d-run{background:#faeeda;color:#854f0b}
  .d-wait{background:#f0f0f0;color:#999}
  .typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#bbb;animation:td 1.2s infinite;margin:0 2px}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes td{0%,80%,100%{opacity:.3}40%{opacity:1}}
  .q-chip{border:1px solid #ddd;border-radius:16px;padding:5px 12px;font-size:12px;cursor:pointer;background:#fff;margin:3px;transition:background .15s}
  .q-chip:hover{background:#f5f4f0}
  .cart-panel{display:none;border-top:1px solid #eee;padding:20px 24px;background:#fff}
  .cart-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px;align-items:center}
  .rm{border:none;background:none;cursor:pointer;color:#bbb;font-size:18px;line-height:1}
  .checkout-btn{width:100%;padding:12px;margin-top:14px;border-radius:10px;border:none;background:#25D366;color:#fff;font-size:14px;font-weight:500;cursor:pointer}
</style>
</head>
<body>

<nav>
  <span class="brand">DRAPE</span>
  <button class="cart-btn" onclick="toggleCart()">
    🛍 Cart <span id="cart-count">0</span>
  </button>
</nav>

<div class="cat-bar" id="cat-bar"></div>
<div class="grid" id="grid"></div>

<div class="bottom" id="bottom" style="display:none">
  <div class="detail-pane">
    <p class="pane-label">Product</p>
    <div id="detail"></div>
  </div>
  <div class="ai-pane">
    <p class="pane-label">🤖 AI agent</p>
    <div id="steps"></div>
    <div id="ai-out"></div>
    <div id="chips" style="margin-top:8px"></div>
  </div>
</div>

<div class="cart-panel" id="cart-panel">
  <p class="pane-label">Your cart</p>
  <div id="cart-items"></div>
  <div id="cart-total" style="font-weight:500;font-size:15px;margin-top:10px"></div>
  <button class="checkout-btn" onclick="whatsappCheckout()">Order via WhatsApp</button>
</div>

<script>
let activeCat='All', selectedProduct=null, selectedSize=null, cart=[], aiHistory=[];

const CATS_ORDER = ['All','Tops','Bottoms','Dresses','Accessories'];

async function loadProducts(cat) {
  const url = cat && cat!=='All' ? `/api/products?cat=${cat}` : '/api/products';
  const res = await fetch(url);
  return res.json();
}

async function init() {
  const products = await loadProducts();
  const cats = ['All', ...new Set(products.map(p=>p.cat))];
  renderCats(cats);
  renderGrid(products);
}

function renderCats(cats) {
  document.getElementById('cat-bar').innerHTML = cats.map(c=>
    `<button class="pill${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

async function setCat(c) {
  activeCat=c;
  const products = await loadProducts(c);
  renderCats(['All',...new Set(products.map(p=>p.cat))||[]]);
  document.getElementById('cat-bar').innerHTML = ['All','Tops','Bottoms','Dresses','Accessories'].map(cc=>
    `<button class="pill${cc===activeCat?' active':''}" onclick="setCat('${cc}')">${cc}</button>`
  ).join('');
  renderGrid(products);
}

function renderGrid(products) {
  document.getElementById('grid').innerHTML = products.map(p=>`
    <div class="card${selectedProduct?.id===p.id?' selected':''}" onclick="selectProduct(${p.id})">
      <div class="card-img">${p.emoji}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">₹${p.price.toLocaleString()}</div>
        ${p.badge?`<span class="badge b-${p.badge}">${p.badge}</span>`:''}
      </div>
    </div>`).join('');
}

async function selectProduct(id) {
  const res = await fetch(`/api/products/${id}`);
  selectedProduct = await res.json();
  selectedSize = null;
  aiHistory = [];
  document.getElementById('bottom').style.display='grid';
  renderDetail();
  runAgent();
}

function renderDetail() {
  const p = selectedProduct;
  const sizes = Object.keys(p.stock).filter(s=>p.stock[s]>0);
  document.getElementById('detail').innerHTML = `
    <div style="font-size:52px;margin-bottom:8px">${p.emoji}</div>
    <div style="font-size:18px;font-weight:500;margin-bottom:4px">${p.name}</div>
    <div style="font-size:22px;font-weight:600;margin-bottom:6px">₹${p.price.toLocaleString()}</div>
    ${p.badge?`<span class="badge b-${p.badge}" style="margin-bottom:10px;display:inline-block">${p.badge}</span>`:''}
    <div style="font-size:13px;color:#666;margin-bottom:14px">${p.desc}</div>
    <div style="font-size:12px;color:#999;margin-bottom:6px">Select size</div>
    <div class="size-grid" id="szgrid">
      ${sizes.map(s=>`<button class="sz" onclick="pickSize('${s}')">${s}</button>`).join('')}
    </div>
    <button class="add-btn" onclick="addCart()">Add to cart</button>`;
}

function pickSize(s) {
  selectedSize=s;
  document.querySelectorAll('.sz').forEach(b=>b.classList.toggle('on',b.textContent===s));
}

function addCart() {
  if(!selectedSize){alert('Pick a size!');return;}
  cart.push({...selectedProduct,size:selectedSize});
  document.getElementById('cart-count').textContent=cart.length;
  const b=document.querySelector('.add-btn');
  b.textContent='Added ✓'; setTimeout(()=>{b.textContent='Add to cart';},1400);
}

async function runAgent() {
  const p = selectedProduct;
  setSteps([
    {l:'User clicked product — event captured',s:'done'},
    {l:'Reading product & stock data',s:'done'},
    {l:'Checking availability',s:'run'},
    {l:'Generating recommendation',s:'wait'},
    {l:'Preparing quick questions',s:'wait'},
  ]);
  document.getElementById('ai-out').innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('chips').innerHTML='';

  await delay(600);
  setSteps([
    {l:'User clicked product — event captured',s:'done'},
    {l:'Reading product & stock data',s:'done'},
    {l:'Checking availability',s:'done'},
    {l:'Generating recommendation',s:'run'},
    {l:'Preparing quick questions',s:'wait'},
  ]);

  try {
    const res = await fetch('/api/agent/recommend',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({productId:p.id})
    });
    const data = await res.json();
    aiHistory=[
      {role:'user',content:`I'm looking at the ${p.name}.`},
      {role:'assistant',content:data.reply}
    ];
    setSteps([
      {l:'User clicked product — event captured',s:'done'},
      {l:'Reading product & stock data',s:'done'},
      {l:'Checking availability',s:'done'},
      {l:'Generating recommendation',s:'done'},
      {l:'Preparing quick questions',s:'done'},
    ]);
    document.getElementById('ai-out').innerHTML=`<div class="ai-bubble">${data.reply}</div>`;
    document.getElementById('chips').innerHTML=`
      <div style="font-size:11px;color:#999;margin-bottom:4px">Ask the agent</div>
      <button class="q-chip" onclick="askAgent('Does this go well with jeans?')">Goes with jeans?</button>
      <button class="q-chip" onclick="askAgent('What is the return policy?')">Return policy?</button>
      <button class="q-chip" onclick="askAgent('Suggest a complete outfit with this.')">Full outfit?</button>
      <button class="q-chip" onclick="askAgent('Is this good for an event or party?')">For a party?</button>`;
  } catch(e) {
    document.getElementById('ai-out').innerHTML=`<div class="ai-bubble">Great pick! The ${p.name} at ₹${p.price.toLocaleString()} is a bestseller. Select your size and add to cart!</div>`;
  }
}

async function askAgent(q) {
  document.getElementById('chips').innerHTML='';
  const prev=document.getElementById('ai-out').innerHTML;
  document.getElementById('ai-out').innerHTML=prev+`<div style="text-align:right;margin:6px 0"><span style="background:#f0f0f0;border-radius:10px;padding:6px 10px;font-size:12px;display:inline-block">${q}</span></div><div class="typing"><span></span><span></span><span></span></div>`;
  aiHistory.push({role:'user',content:q});

  try {
    const res=await fetch('/api/agent/recommend',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({productId:selectedProduct.id,conversationHistory:aiHistory})
    });
    const data=await res.json();
    aiHistory.push({role:'assistant',content:data.reply});
    document.querySelector('.typing')?.remove();
    document.getElementById('ai-out').innerHTML+=`<div class="ai-bubble">${data.reply}</div>`;
  } catch(e) {
    document.querySelector('.typing')?.remove();
  }
}

function setSteps(steps) {
  document.getElementById('steps').innerHTML=steps.map(s=>`
    <div class="ai-step">
      <div class="dot d-${s.s}">${s.s==='done'?'✓':s.s==='run'?'…':'·'}</div>
      <span>${s.l}</span>
    </div>`).join('');
}

function toggleCart() {
  const cp=document.getElementById('cart-panel');
  const show=cp.style.display==='none'||!cp.style.display;
  cp.style.display=show?'block':'none';
  if(show)renderCart();
}

function renderCart() {
  const items=document.getElementById('cart-items');
  if(!cart.length){items.innerHTML='<div style="color:#999;font-size:13px">Nothing here yet.</div>';document.getElementById('cart-total').textContent='';return;}
  items.innerHTML=cart.map((c,i)=>`
    <div class="cart-row">
      <span>${c.emoji} ${c.name} <span style="color:#999">(${c.size})</span></span>
      <span style="display:flex;align-items:center;gap:8px">₹${c.price.toLocaleString()}<button class="rm" onclick="removeCart(${i})">×</button></span>
    </div>`).join('');
  const total=cart.reduce((s,c)=>s+c.price,0);
  document.getElementById('cart-total').textContent=`Total: ₹${total.toLocaleString()}`;
}

function removeCart(i){cart.splice(i,1);document.getElementById('cart-count').textContent=cart.length;renderCart();}

function whatsappCheckout() {
  const total=cart.reduce((s,c)=>s+c.price,0);
  const msg=`Hi DRAPE! I want to order:\n`+cart.map(c=>`• ${c.name} (${c.size}) — ₹${c.price.toLocaleString()}`).join('\n')+`\n\nTotal: ₹${total.toLocaleString()}`;
  const url=`https://wa.me/${(window.WHATSAPP_NUMBER||'919999999999')}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

init();
</script>
</body>
</html>
